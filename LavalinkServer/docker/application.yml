server:
  port: ${PORT:2333}

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"

  server:
    password: ${LAVALINK_PASSWORD:youshallnotpass}

    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

plugins:
  youtube:
    enabled: true

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    clients:
      - TVHTML5EMBEDDED
      - ANDROID
      - IOS
      - MUSIC
